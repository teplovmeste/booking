<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ТеплоВместе — админка записи</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Literata:opsz,wght@7..72,600;7..72,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="site-header__content">
          <div class="brand-lockup">
            <a class="brand-link" href="https://www.teplovmeste.com/">
              <img class="brand-logo" src="/logo.png" alt="ТеплоВместе" />
            </a>
            <h1>Админка онлайн-записи</h1>
          </div>
        </div>
        <div class="header-actions">
          <a class="admin-link" href="./">К странице записи</a>
          <a class="admin-link" href="./admin/logout">Выйти</a>
        </div>
      </header>

      <main class="admin-layout">
        <section class="panel panel-soft">
          <div class="section-heading">
            <p class="eyebrow">Слоты</p>
            <h2>Создать слот</h2>
          </div>
          <div class="feedback hidden" id="slot-form-feedback"></div>
          <form class="admin-form" id="slot-form">
            <label>
              <span>Психолог</span>
              <select name="psychologist_id" required></select>
            </label>
            <div class="form-grid form-grid--slot-time">
              <label>
                <span>Дата по Москве</span>
                <input name="starts_at_date" type="date" required />
              </label>
              <label>
                <span>Часы</span>
                <select name="starts_at_hour" required></select>
              </label>
              <label>
                <span>Минуты</span>
                <select name="starts_at_minute" required>
                  <option value="00">00</option>
                  <option value="30">30</option>
                </select>
              </label>
            </div>
            <button class="button-primary" type="submit">Создать слот</button>
          </form>
        </section>

        <section class="panel" id="slots-section">
          <div class="toolbar">
            <div class="section-heading">
              <p class="eyebrow">Заявки</p>
              <h2>Список заявок</h2>
            </div>
            <form class="filters" id="booking-filters">
              <input name="date" type="date" />
              <select name="psychologist_id"></select>
              <select name="status"></select>
              <button class="button-secondary" type="submit">Фильтровать</button>
            </form>
          </div>
          <div class="feedback hidden" id="bookings-feedback"></div>
          <div class="table-card" id="bookings-list"></div>
        </section>

        <section class="panel">
          <div class="toolbar">
            <div class="section-heading">
              <p class="eyebrow">Слоты</p>
              <h2>Список слотов</h2>
            </div>
            <form class="filters" id="slot-filters">
              <input name="date" type="date" />
              <select name="psychologist_id"></select>
              <select name="status"></select>
              <button class="button-secondary" type="submit">Фильтровать</button>
            </form>
          </div>
          <div class="feedback hidden" id="slots-feedback"></div>
          <div class="table-card" id="slots-list"></div>
        </section>

        <section class="panel panel-soft">
          <div class="section-heading">
            <p class="eyebrow">Психологи</p>
            <h2>Управление психологами</h2>
          </div>
          <div class="feedback hidden" id="psychologist-form-feedback"></div>
          <form class="admin-form" id="psychologist-form">
            <div class="form-grid">
              <label>
                <span>Имя</span>
                <input name="name" type="text" required />
              </label>
              <label>
                <span>Email</span>
                <input name="email" type="email" required />
              </label>
              <label>
                <span>Возрастные категории</span>
                <div class="checkbox-group" data-psychologist-categories></div>
              </label>
              <label>
                <span>Статус</span>
                <select name="is_active" required>
                  <option value="true">Активен</option>
                  <option value="false">Выключен</option>
                </select>
              </label>
            </div>
            <button class="button-primary" type="submit">Добавить психолога</button>
          </form>
          <div class="table-card admin-list" id="psychologists-list"></div>
        </section>
      </main>
    </div>

    <script src="./admin.js" type="module"></script>
  </body>
</html>
