<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ТеплоВместе — вход в админку</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Literata:opsz,wght@7..72,600;7..72,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="auth-layout">
        <section class="panel panel-soft auth-panel">
          <div class="site-header__content">
            <div class="brand-lockup">
              <img class="brand-logo" src="/logo.png" alt="ТеплоВместе" />
              <div>
                <p class="eyebrow">ТеплоВместе</p>
                <h1>Вход в админку</h1>
              </div>
            </div>
          </div>

          <p class="section-text">
            Введите логин и пароль администратора, чтобы открыть управление слотами, психологами и заявками.
          </p>

          <div class="feedback hidden" id="login-feedback"></div>

          <form class="admin-form auth-form" id="admin-login-form" action="./login" method="post">
            <label>
              <span>Логин</span>
              <input name="username" type="text" autocomplete="username" required />
            </label>
            <label>
              <span>Пароль</span>
              <input name="password" type="password" autocomplete="current-password" required />
            </label>
            <button class="button-primary" type="submit">Войти</button>
          </form>
        </section>
      </main>
    </div>

    <script src="../admin-login.js" type="module"></script>
  </body>
</html>
